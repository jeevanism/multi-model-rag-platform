services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: multimodel-rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multimodel_rag}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-multimodel_rag}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

